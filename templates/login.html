{% extends "layout.html" %}

{% block title %}Sign In | SOWARNA SAREES{% endblock %}

{% block content %}

<div class="max-w-md mx-auto mt-10 md:mt-20 px-4 md:px-0">

    <div class="glass p-6 md:p-10 border-white/5 shadow-2xl">

        <!-- Panda Mascot -->
        <div class="mascot-container" id="panda-mascot">

            <div class="mascot-board" id="dog-board">
                Welcome!
            </div>

            <div class="panda-face">

                <div class="ear-l"></div>
                <div class="ear-r"></div>

                <div class="blush-l"></div>
                <div class="blush-r"></div>

                <div class="eye-l">
                    <div class="eyeball-l"></div>
                </div>

                <div class="eye-r">
                    <div class="eyeball-r"></div>
                </div>

                <div class="nose"></div>
                <div class="mouth"></div>

                <div class="hand-l"></div>
                <div class="hand-r"></div>

            </div>

        </div>

        <h2 class="text-3xl md:text-4xl font-black mb-2 tracking-tighter text-center">
            Welcome Back
        </h2>

        <p class="text-gray-400 text-center mb-8 md:mb-10 text-sm">
            Sign in to manage your wishlist and orders.
        </p>

        <form
            action="/login"
            method="POST"
            class="space-y-6"
            id="loginForm"
        >

            <!-- Email -->
            <div>

                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">
                    Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    required
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-6 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500 text-white placeholder-gray-600 transition-all mascot-target"
                >

            </div>

            <!-- Password -->
            <div class="relative">

                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">
                    Password
                </label>

                <div class="relative">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        data-view="false"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-6 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500 text-white placeholder-gray-600 transition-all mascot-target"
                    >

                    <button
                        type="button"
                        onclick="togglePassword('password', 'eye-icon')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors"
                    >

                        <svg
                            id="eye-icon"
                            xmlns="http://www.w3.org/2000/svg"
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >

                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>

                            <circle cx="12" cy="12" r="3"></circle>

                        </svg>

                    </button>

                </div>

            </div>

            <!-- Submit -->
            <button
                type="submit"
                class="w-full glow-border-btn text-lg"
            >
                <span>Sign In</span>
            </button>

        </form>

        <!-- Divider -->
        <div class="mt-8 relative">

            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-white/10"></div>
            </div>

            <div class="relative flex justify-center text-xs uppercase">

                <span class="bg-[#16213e] px-4 text-gray-500 font-bold">
                    Or continue with
                </span>

            </div>

        </div>

        <!-- Google Login -->
        <div class="mt-8">

            <a
                href="/login/google"
                class="w-full py-4 rounded-xl glass border-white/10 hover:bg-white/5 flex items-center justify-center space-x-3 transition-all font-bold"
            >

                <svg class="w-5 h-5" viewBox="0 0 24 24">

                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    />

                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    />

                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                    />

                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    />

                </svg>

                <span>Google Account</span>

            </a>

        </div>

        <!-- Register -->
        <p class="text-center mt-10 text-sm text-gray-500 font-medium">

            New here?

            <a
                href="/register"
                class="text-pink-500 hover:underline"
            >
                Create an account
            </a>

        </p>

    </div>

</div>

<!-- Scripts -->
<script>

document.addEventListener('DOMContentLoaded', () => {

    const mascot = new PandaMascot('panda-mascot');

    document.querySelectorAll('.mascot-target').forEach(input => {

        mascot.trackInput(input);

    });

    // Password Toggle
    window.togglePassword = function(inputId, iconId) {

        const input = document.getElementById(inputId);

        const icon = document.getElementById(iconId);

        if (input.type === 'password') {

            input.type = 'text';

            input.dataset.view = 'true';

            mascot.setPrivacy(false);

            icon.innerHTML =
                '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';

        } else {

            input.type = 'password';

            input.dataset.view = 'false';

            if (document.activeElement === input) {

                mascot.setPrivacy(true);
            }

            icon.innerHTML =
                '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    };

    // Login Form
    document.getElementById('loginForm').addEventListener('submit', function(e) {

        const email =
            this.querySelector('input[name="email"]').value;

        const password =
            this.querySelector('input[name="password"]').value;

        if (!email || !password) {

            e.preventDefault();

            mascot.showMessage(
                'Fill the respective field',
                false
            );

            return;
        }

        e.preventDefault();

        mascot.showMessage('Success!', true);

        setTimeout(() => {

            const preloader =
                document.getElementById('preloader');

            if (preloader) {

                preloader.style.visibility = 'visible';

                preloader.style.opacity = '1';
            }

            this.submit();

        }, 1000);
    });

});

</script>

{% endblock %}
